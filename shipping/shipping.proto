syntax = "proto3";

option go_package = "github.com/joanaeliseal/microservices-proto/golang/shipping";

message ShipOrderRequest {
  int64 order_id = 1;
  repeated OrderItem order_items = 2;
}

message OrderItem {
  string product_code = 1;
  int32 quantity = 2;
}

message ShipOrderResponse {
  int32 estimated_days = 1;
}

service Shipping {
  rpc Ship(ShipOrderRequest) returns (ShipOrderResponse);
}
